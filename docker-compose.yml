version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: omcb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: omcb_server
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: omcb_client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  redis_data:
